description: >
  Run DevAssure as a command step inside a custom CircleCI job.
usage:
  version: 2.1
  orbs:
    devassure: devassure/devassure@x.y.z
  jobs:
    devassure-custom-job:
      docker:
        - image: cimg/node:24.4
      steps:
        - checkout
        - devassure/devassure:
            token: $DEVASSURE_TOKEN
            command: test
            source: << pipeline.git.branch >>
            target: main
            minimum_score: "80"
            workers: "2"
            url: "https://example.com"
  workflows:
    devassure-step-example:
      jobs:
        - devassure-custom-job
